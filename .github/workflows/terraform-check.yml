name: Terraform Check

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (day1)
        run: |
          cd day1
          terraform init

      - name: Terraform Format Check (day1)
        run: |
          cd day1
          terraform fmt -check

      - name: Terraform Validate (day1)
        run: |
          cd day1
          terraform validate

      - name: Terraform Plan (day1)
        run: |
          cd day1
          terraform plan
